# Console + printk are on by default for hifive1_revb (it has a UART console),
# so this can stay empty for the hello example. Add Kconfig options here.
CONFIG_SHELL=y
CONFIG_APP_SPEAKER=y

# Motor: the PWM subsystem isn't in the board defconfig, so enable it here. With
# pwm2 "okay" this pulls in the sifive PWM driver. GPIO is already on by default.
CONFIG_PWM=y
CONFIG_APP_MOTOR=y
