# Console + printk are on by default for xiao_esp32c6 (console + shell run over
# the USB-Serial/JTAG port), so this stays minimal. Add Kconfig options here.
CONFIG_SHELL=y
CONFIG_APP_SPEAKER=y

# Motor: the PWM subsystem isn't in the board defconfig, so enable it here. With
# ledc0 "okay" this pulls in the Espressif LEDC PWM driver. GPIO is already on by
# default.
CONFIG_PWM=y
CONFIG_APP_MOTOR=y

# Antenna: power the XIAO RF switch and select the onboard antenna. A default
# build leaves the switch unpowered, so the radio runs on a degraded leakage
# path; this drives GPIO3 to power it and GPIO14 to keep the onboard antenna.
# GPIO is already on by default. See docs/LOG.md [antenna].
CONFIG_APP_ANTENNA=y

# LED: the board's yellow_led sits under a gpio-leds controller, so enable the
# LED subsystem and its GPIO driver to instantiate the device the led_*_dt API
# (in app/src/led.c) binds to.
CONFIG_LED=y
CONFIG_LED_GPIO=y

# Logging: led_start reports a failed LED init via LOG_ERR.
CONFIG_LOG=y
CONFIG_LOG_CMDS=y

# Reboot: the "restart" shell command cold-reboots via sys_reboot().
CONFIG_REBOOT=y

# WiFi: the on-chip 2.4 GHz radio, station mode, auto-connecting at boot from a
# credential stored in flash. Config mirrors the verified upstream
# samples/net/wifi/shell set (see docs/LOG.md [wifi]); CONFIG_WIFI selects
# MBEDTLS + PSA_CRYPTO (the mbedtls + tf-psa-crypto west modules), and
# CONFIG_NETWORKING pulls in ENTROPY_GENERATOR -> the board's hardware TRNG, so
# no test RNG is needed.
CONFIG_APP_WIFI=y
CONFIG_WIFI=y
CONFIG_WIFI_LOG_LEVEL_ERR=y
CONFIG_NET_L2_WIFI_SHELL=y
# Espressif WiFi STA starts DHCPv4 itself once associated.
CONFIG_ESP32_WIFI_STA_AUTO_DHCPV4=y

# Networking: IPv4 + DHCP client + TCP. IPv6 off (unused here). NET_MGMT queue
# sized 16 so a scan's burst of events does not overflow it (the #82874 setting,
# verified fine on this board).
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_DHCPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_SHELL=y
CONFIG_NET_LOG=y
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=16
CONFIG_NET_MGMT_EVENT_QUEUE_TIMEOUT=5000

# Net buffers and thread stacks: the WiFi + IP stack needs more than the
# defaults. Values from the verified wifi/shell sample.
CONFIG_MAIN_STACK_SIZE=5200
CONFIG_SHELL_STACK_SIZE=5200
CONFIG_NET_TX_STACK_SIZE=2048
CONFIG_NET_RX_STACK_SIZE=2048
CONFIG_NET_PKT_RX_COUNT=10
CONFIG_NET_PKT_TX_COUNT=10
CONFIG_NET_BUF_RX_COUNT=20
CONFIG_NET_BUF_TX_COUNT=20
CONFIG_NET_MAX_CONTEXTS=10

# Credentials: persist networks so the board connects once and auto-reconnects
# from flash across reboots and reflashes (west flash leaves the storage
# partition intact). SETTINGS/NVS backend in the board's "storage" partition;
# the PSA backend needs TF-M (ARM only), unavailable on this RISC-V part. The
# default "wifi cred" + "wifi cred auto_connect" shell commands come with it.
# GOTCHA: "wifi cred list" prints the passphrase in plaintext (see docs/LOG.md).
CONFIG_WIFI_CREDENTIALS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y

# mDNS: answer "pump.local" so the headless board is reachable by name without a
# DHCP-lease lookup and without the router cooperating (mDNS is peer-to-peer
# multicast, independent of router DNS). The responder auto-starts and needs a
# hostname, so NET_HOSTNAME_ENABLE + NET_HOSTNAME are required; setting the
# hostname also makes the DHCP client advertise "pump" (option 12) instead of
# the default "zephyr". See docs/LOG.md [mdns].
CONFIG_NET_HOSTNAME_ENABLE=y
CONFIG_NET_HOSTNAME="pump"
CONFIG_MDNS_RESPONDER=y

# Append the last two MAC bytes (as hex) to the hostname at boot, e.g.
# "pump6820", so two boards running this firmware get distinct names. Needs the
# dynamic-hostname API (net_hostname_set); app/src/wifi.c builds the name once
# the interface MAC is up and before associating, so DHCP (option 12) and mDNS
# both advertise the final name.
CONFIG_NET_HOSTNAME_DYNAMIC=y

