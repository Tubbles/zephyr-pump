# Console + printk are on by default for xiao_esp32c6 (console + shell run over
# the USB-Serial/JTAG port), so this stays minimal. Add Kconfig options here.
CONFIG_SHELL=y
CONFIG_APP_SPEAKER=y

# Motor: the PWM subsystem isn't in the board defconfig, so enable it here. With
# ledc0 "okay" this pulls in the Espressif LEDC PWM driver. GPIO is already on by
# default.
CONFIG_PWM=y
CONFIG_APP_MOTOR=y
