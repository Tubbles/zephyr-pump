# Sysbuild (multi-image) configuration: how the MCUboot bootloader image is
# built alongside the app. west reads this automatically for `--sysbuild` builds.
#
# The xiao_esp32c6 board already defaults the bootloader choice to MCUboot
# (boards/seeed/xiao_esp32c6/Kconfig.sysbuild), so we only pick the mode here.
#
# DirectXIP: MCUboot boots the app in place from whichever slot (slot0 or slot1)
# holds the higher image version, with NO copy/swap. The ESP32-C6 executes code
# from flash through its MMU, so "switching slots" is just a remap -- DirectXIP
# fits the hardware and avoids the flash wear and boot-time copy of the default
# swap-using-move mode. This mode also auto-generates an `app_slot1_variant`
# image (linked for slot1) used to stage an update into the secondary slot.
#
# Signing is left at the board default (BOOT_SIGNATURE_TYPE_NONE): the image
# carries an MCUboot header + SHA-256 but no cryptographic signature yet. Turn on
# a real BOOT_SIGNATURE_TYPE + key before trusting an update path.
SB_CONFIG_MCUBOOT_MODE_DIRECT_XIP=y
